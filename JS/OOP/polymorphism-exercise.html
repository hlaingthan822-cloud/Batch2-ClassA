      class Shape {
        getArea() {
          console.log("Shape Area");
        }
      }
      class Rectangle extends Shape {
        constructor(width, height) {
          super();
          this.width = width;
          this.height = height;
        }
        getArea() {
          return this.width * this.height;
        }
      }
      class Circle extends Shape {
        constructor(radius) {
          super();
          this.radius = radius;
        }
        getArea() {
          return Math.PI * this.radius ** 2;
        }
      }
      class Triangle extends Shape {
        constructor(base, height) {
          super();
          this.base = base;
          this.height = height;
        }
        getArea() {
          return 0.5 * this.base * this.height;
        }
      }
      let c1;
      c1 = new Rectangle(3, 2);
      console.log("Area is: " + c1.getArea()); //6
      c1 = new Circle(2);
      console.log("Area is: " + c1.getArea()); //12.8
      c1 = new Triangle(3, 4);
      console.log("Area is: " + c1.getArea()); //6
    </script>
