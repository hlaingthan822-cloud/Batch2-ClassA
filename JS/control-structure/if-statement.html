<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>If statement Example</title>
  </head>
  <body>
    <script>
      //if statement checks if a condition is true
      let age = 18;
      if (age > 18 || age == 18) {
        document.write("You are an adult.");
      }
    </script>
  </body>
</html>
