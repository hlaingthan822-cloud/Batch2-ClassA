<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>else-if example</title>
  </head>
  <body>
    <script>
      let weather = "sunny";
      if (weather === "sunny") {
        document.write("It's sunny! Let's go outside.");
      } else if (weather === "raining") {
        document.write("It's raining. Take an umbrella.");
      } else {
        document.write("The weather is unknown. Let's stay home.");
      }
    </script>
  </body>
</html>
