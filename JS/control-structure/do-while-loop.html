<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>do.. while loop example</title>
  </head>
  <body>
    <h3>Counting from 1 to 5 using a do..while loop</h3>
    <script>
      let i = 1; //start counting at 1
      do {
        document.write("Number : " + i + "<br>");
        i++; //increase the number
      } while (i <= 5); //loop continues while i is 5 or less
    </script>
  </body>
</html>
