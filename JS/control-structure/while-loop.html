<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>While Loop Example</title>
  </head>
  <body>
    <h3>Counting from 1 to 5 using a while loop</h3>
    <script>
      let i = 1; //start counting at 1
      while (i <= 5) {
        document.write("Number : " + i + "<br>");
        i++; //Increase the number by 1 each time
      }
    </script>
  </body>
</html>
