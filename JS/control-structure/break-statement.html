<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Break Statement example</title>
  </head>
  <body>
    <h3>Using break to stop a loop</h3>
    <script>
      for (let i = 1; i <= 10; i++) {
        if (i === 5) {
          break; //stop the loop when i equals 5
        }
        document.write("Number : " + i + "<br>");
      }
    </script>
  </body>
</html>
