<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>If-else Statement Example</title>
  </head>
  <body>
    <script>
      let weather = "sunny";
      if (weather === "sunny") {
        document.write("It is sunny! Let's go otside");
      } else {
        document.write("It's not sunny. Let's stay home.");
      }
    </script>
  </body>
