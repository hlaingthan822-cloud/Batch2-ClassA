<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Javascript Parameters and return values example</title>
  </head>
  <body>
    <h1>Javascript Parameters and Return Values Example</h1>
    <script>
      function sayHello(name) {
        //'name' is a parameter
        console.log("Hello " + name + "!");
      }
      sayHello("Aung");
      sayHello("Su");

      //Parameters are variables in the function definition.
      function add(a, b) {
        return a + b;
      }
      let result = add(5, 3); //Arguments are values you pass when calling the function
      console.log(result); //Output:8
      //Return Statement
      function square(n) {
        return n * n;
      }
      console.log(square(4));
    </script>
  </body>
</html>
