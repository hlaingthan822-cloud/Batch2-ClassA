<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Higher-Order Function</h1></title>
  </head>
  <body>
    <h1>Higher-Order Function</h1>
    <h2>1. Simple Example1- Passing a function as a parameter</h2>
    <h2>2. Simple Example2- Returning a function</h2>
    <h2>3. Real Example- Built-in Javascript Function (forEach)</h2>
    <script>
      console.log("=======Example1 : Passing a function as a parameter");
      function sayHello(name) {
        console.log("Hello, " + name + " from sayHello function!");
      }

      function greetUser(callback) {
        //callback is a function parameter
        console.log("greetingUser is calling the callback...");
        callback("Aung Aung"); //run the function that was pass in
      }
      greetUser(sayHello);
      console.log("=====Example2 : Returning a function=====");
      function createGreeter() {
        console.log("createGreeter is returning is returning a new function");
        return function () {
          console.log("Hello from the returned function!");
        };
      }
      const greeter = createGreeter(); //greeter now holds the returned function
      greeter(); //call the return function
      console.log(
        "===== Example3 : Built-in Higher-order Function(forEach)===",
      );
      const numbers = [1, 2, 3, 4];
      numbers.forEach(function (num, index) {
        console.log("Numbers : ", num, " at index " + index);
      });
    </script>
  </body>
</html>
