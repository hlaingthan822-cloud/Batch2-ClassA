<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Javascript Function Example</title>
  </head>
  <body>
    <h1>Javaescript Function Example</h1>
    <script>
      //declaring and calling functions
      //no return function
      function greet() {
        console.log("Hello!");
      }
      //calling the function
      greet();
      //return values function
      function sum() {
        let a = 10;
        let b = 10;
        return a + b;
      }
      //calling the function
      const result = sum();
      console.log(result);
    </script>
  </body>
</html>
