<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recursion Example</title>
  </head>
  <body>
    <h1>Recursion Examples</h1>
    <script>
      console.log("=====Without Recursion====");
      //Without recursion: manually printing numbers
      console.log(5);
      console.log(4);
      console.log(3);
      console.log(2);
      console.log(1);
      console.log("=====With Recursion===");
      //With recursion: function calls itself
      function countDown(number) {
        console.log(number);
        if (number > 1) {
          countDown(number - 1); //recursive call
        }
      }
      countDown(5);
    </script>
  </body>
</html>
