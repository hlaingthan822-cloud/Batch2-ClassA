<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Javascript reduce()-Example</h1></title>
  </head>
  <body>
    <h1>Jvascript reduce()- Example</h1>
    <script>
      //Example 1 : Sum all numbers.
      const numbers = [10, 20, 30];
      const total = numbers.reduce((acc, curr) => acc + curr, 0); //"0" is initial value
      console.log(total);

      //Example 2: Count occurance
      const fruits = ["apple", "banana", "apple", "orange", "apple"];
      const count = fruits.reduce((acc, fruit) => {
        acc[fruit] = (acc[fruit] || 0) + 1;
        return acc;
      }, {}); //acc={}
      //index=0, acc={apple: 1}
      //index=1, acc={apple: 1,banana: 1}
      //index=2, acc={apple: 2,banana: 1}
      //index=3, acc={apple: 2,banana: 1,orange: 1}
      //index=4, acc={apple: 3,banana: 1, orange: 1}
      console.log(count);
      //{apple:3,banana:1,orange:1}
    </script>
  </body>
</html>
