<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map Exercise2</title>
  </head>
  <body>
    <h1>Map-Exercise2</h1>
    <script>
      const students = [
        { name: "Sara", score: 80 },
        { name: "Tom", score: 90 },
      ];
      const result = students.map((student) => ({
        name: student.name.toUpperCase(),
        score: student.score,
      }));
      console.log(result);
    </script>
  </body>
</html>
