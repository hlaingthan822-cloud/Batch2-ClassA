<!doctype html>
<html lang="en">
  <head>

    <title>Reduce Exercise2</title>

  <body>
    <h1>Reduce Exercise2</h1>
    <script>
      const number = [5, 8, 2, 10, 3];
      const result = number.reduce((acc, curr) => {
        return curr > acc ? curr : acc;
      });
      console.log("The Maximun number is ", result);
    </script>
  </body>
