<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Javascript Callback Hell Example</title>
  </head>
  <body>
    <h1>Callback with promise</h1>
    <script>
      function getUser() {
        return new Promise((resolve, reject) => {
          try {
            console.log("Getting user...");
            setTimeout(() => {
              const user = { id: 1, name: "Alice" };
              console.log("User received: ", user);
              resolve(user);
            }, 5000);
          } catch (error) {
            reject(error);
          }
        });
      }

      function getPosts(userId) {
        return new Promise((resolve, reject) => {
          try {
            console.log("Getting posts for users : ", userId);
            setTimeout(() => {
              const posts = [
                { id: 101, title: "Post 1" },
                { id: 102, title: "Post 2" },
              ];
              console.log("Posts received :", posts);
              resolve(posts);
            }, 5000);
          } catch (error) {
            reject(error);
          }
        });
      }

      function getComments(postId) {
        return new Promise((resolve, reject) => {
          try {
            console.log("Getting comments for post : ", postId);
            setTimeout(() => {
              const comments = [
                { id: 201, text: "Great post!" },
                { id: 202, text: "Nice info!" },
              ];
              console.log("Comments received : ", comments);
              resolve(comments);
            }, 5000);
          } catch (error) {
            reject(error);
          }
        });
      }

      /*getUser()
        .then((user) => getPosts(user.id))
        .then((posts) => getComments(posts[0].id))
        .then((comments) => {
          console.log("All data loaded successfully!", comments);
        });
      console.log("End of all final console");*/

      async function ShowUser() {
        try {
          const user = await getUser();
          const post = await getPosts(user.id);
          const comment = await getComments(post[0].id);
          console.log("comment", comment);
        } catch (error) {
          concole.log("Error in runTask", error);
        }
      }

      ShowUser();
    </script>
  </body>
</html>
