<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Running Promise in Parallel</title>
  </head>
  <body>
    <h1>Running Promises in Parallel (Promise.all)</h1>
    <p>Open the console to see how multiple async tasks run together</p>
    <script>
      //Two tasks that take different amounts of time
      function tasks1() {
        return new Promise((resolve) =>
          setTimeout(() => resolve("Task1 done"), 3000),
        );
      }
      function task2() {
        return new Promise((resolve) =>
          setTimeout(() => resolve("Task2 dine"), 5000),
        );
      }
      //Run both tasks in parallel using Promise.all
      async function runTasks() {
        console.log("Starting tasks...");
        const results = await Promise.all([tasks1(), task2()]);
        console.log("All tasks completed:");
        console.log(results);
      }
      //execute
      runTasks();
    </script>
  </body>
</html>
