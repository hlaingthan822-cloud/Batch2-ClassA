<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment Operators Example</title>
  </head>
  <body>
    <h2>Javascript Assignment Operators</h2>
    <script>
      let x = 10;
      document.write("Initial value of x: " + x + "<br><br>");

      x += 5; //same as x=x+5;
      document.write("After x+=5: " + x + "<br>");

      x -= 3; //same as x=x-3;
      document.write("After x-=3: " + x + "<br>"); //12

      x *= 2; //same as x=x*2;
      document.write("After x*=2: " + x + "<br>"); //24

      x /= 4; //same as x=x/4;
      document.write("After x/=4: " + x + "<br>"); //6

      x %= 3; //same as x=x%3;
      document.write("After x%=3: " + x + "<br>"); //0
      
    </script>
  </body>
</html>
