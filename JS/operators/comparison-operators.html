<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparison Operators</title>
</head>
<body>
    <script>
        let a= 10;
        let b = 5;

        document.write("a == b:" + (a == b) + "<br>");
        document.write("a != b:" + (a != b) + "<br>");
        document.write("a > b:" + (a > b) + "<br>");
        document.write("a < b:" + (a < b) + "<br>");
        document.write("a >= b:" + (a >= b) + "<br>");
        document.write("a <= b:" + (a <= b) + "<br>");

        let num = "10";
        document.write("a == num :" + (a == num) + "<br>"); //true
        document.write("a === num :" + (a === num) + "<br>"); //false

    </script>
</body>
</html>
