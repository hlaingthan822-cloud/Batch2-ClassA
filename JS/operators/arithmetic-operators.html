<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arithmetic Operators</title>
  </head>
  <body>
    <script>
      let a = 10;
      let b = 3;
      document.write("a+b=" + (a + b) + "<br>");
      document.write("a-b=" + (a - b) + "<br>");
      document.write("a*b=" + a * b + "<br>");
      document.write("a/b=" + a / b + "<br>");
      document.write("a%b=" + (a % b) + "<br>");
      a++;
      document.write("a++=" + a + "<br>");
      b--;
      document.write("b--=" + b + "<br>");
    </script>
  </body>
</html>
