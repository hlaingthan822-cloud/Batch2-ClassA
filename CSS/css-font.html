<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Text and Font Lesson</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      h1 {
        font-family: Georgia, serif;
        font-size: 36px;
        font-weight: bold;
        color: #2c3e50;
        text-align: center;
        letter-spacing: 2px;
        line-height: 1.2;
      }
      p {
        font-family: "Roboto", monospace;
        font-size: 10px;
        color: #34495e;
        line-height: 1.6;
        letter-spacing: 1px;
        word-spacing: 4px;
        text-align: justify;
      }
      .highlight {
        color: #e74c3c;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>Welcome to CSS Text and Fonts</h1>
    <p>
      CSS allows you to style text in many ways. You can change the
      <span class="highlight">font family</span>,
      <span class="highlight">size</span>,
      <span class="highlight">weight</span>,
      <span class="highlight">color</span>, spacing and aligment to make your
      website look more professional and readable.
    </p>
  </body>
</html>
