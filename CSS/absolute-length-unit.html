<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Measurement Unit</title>
    <style>
      .unit-mm {
        font-size: 5mm;
      }
      .unit-cm {
        font-size: 1cm;
      }
      .unit-inch {
        font-size: 0.5in;
      }
      .unit-px {
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <h1>Absolute Length Unit</h1>
    <h1 class="unit-mm">Font size 5mm</h1>
    <h1 class="unit-cm">Font size 1cm</h1>
    <h1 class="unit-inch">Font size 0.5 inch</h1>
    <h1 class="unit-px">Font size 15px</h1>
  </body>
</html>
