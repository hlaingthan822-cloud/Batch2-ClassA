<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Position Example</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        height: 2000px;
      }
      .container {
        position: relative; /*important*/
        height: 200px;
        background: #f1f5f9;
        border: 2px solid #94a3b0;
        margin-bottom: 40px;
      }
      .box {
        width: 120px;
        height: 80px;
        color: white;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
      }
      .static {
        background: #3b82f6;
        position: static;
      }
      .relative {
        background: #ef4444;
        position: relative;
        top: 50px;
        left: 20px;
      }
      .absolute {
        background: #22c55e;
        position: absolute;
        bottom: 10px;
        right: 10px;
      }
      .fixed {
        background: #a855f7;
        position: fixed;
        bottom: 100px;
        right: 100px;
      }
      .sticky {
        background: #f59e0b;
        position: sticky;
        top: 0;
      }
    </style>
  </head>
  <body>
    <h1>CSS Position Property</h1>

    <h2>Static(default)</h2>
    <div class="container">
      <div class="box static">Static</div>
    </div>

    <h2>Relative</h2>
    <div class="container">
      <div class="box relative">Relative</div>
    </div>

    <h2>Absolute(inside relative container)</h2>
    <div class="container">
      <div class="box absolute">Absolute</div>
    </div>

    <h2>Fixed (to viewport)</h2>
    <p>Scroll down to see the fixed box stay in place.</p>
      <div class="box fixed">Fixed</div>
    </div>

    <h2>Sticky</h2>
    <div class="container">
      <div class="box sticky">Sticky</div>
    </div>
  </body>
</html>
