<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Floating Action Button Example</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        height: 1500px;
        margin: 0;
      }
      .fab {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 50px;
        border-radius: 50%;
        border: none;
        background: #ef4444;
        color: white;
        font-size: 1.5rem;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <p style="padding: 2rem">
      Scroll the page to see the floating button stay in place.
    </p>
    <button class="fab">+</button>
  </body>
</html>
